<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Western Record Player</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="scene">

    <!-- 唱片机主体 -->
    <div class="record-player" id="player">

      <!-- 黑胶 -->
      <div class="vinyl" id="vinyl"></div>

      <!-- 唱针 -->
      <div class="tonearm" id="tonearm">
        <div class="arm"></div>
        <div class="head"></div>
      </div>

      <!-- 点击区域 -->
      <div class="hit-area" id="toggle"></div>

    </div>

    <!-- 音频 -->
    <audio id="audio" src="music.mp3"></audio>

  </div>

  <script src="script.js"></script>
</body>
</html>
